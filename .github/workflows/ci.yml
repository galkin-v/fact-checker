name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.8"
          enable-cache: true
      - run: uv sync --frozen
      - run: make check
      - run: docker build --tag fact-checker:test .
